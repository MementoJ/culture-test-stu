<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>汕头文化现代化倾向测试</title>
    <style>

            background: linear-gradient(135deg, #faf3e8 0%, #f5e6d3 100%);

        }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 40px; }
        .header { text-align: center; padding: 24px 0 12px; }
        .header h1 { font-size: 26px; color: #c45c26; margin-bottom: 6px; font-weight: 700; }
        .header .subtitle { font-size: 13px; color: #8b6f47; line-height: 1.5; }
        .progress-section {
            background: #fff; border-radius: 16px; padding: 14px 20px;
            margin-bottom: 12px; box-shadow: 0 2px 12px rgba(196,92,38,0.08);
        }
        .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; color: #8b6f47; }
        .progress-bar-bg { width: 100%; height: 8px; background: #f0e0d0; border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #e07b39, #c45c26); border-radius: 4px; transition: width 0.4s ease; }
        .profile-section {
            background: #fff; border-radius: 16px; padding: 14px 20px;
            margin-bottom: 12px; box-shadow: 0 2px 12px rgba(196,92,38,0.08);

        .profile-item select:focus { outline: none; border-color: #c45c26; }

        .question-tag {
            display: inline-block; background: #fef3e8; color: #c45c26;

        .question-tag.multi { background: #e8f5e9; color: #2e7d32; }
        .question-text { font-size: 17px; font-weight: 600; color: #3d2b1f; line-height: 1.6; margin-bottom: 16px; }
        .multi-hint { font-size: 12px; color: #8b6f47; margin-bottom: 12px; background: #fef9f3; padding: 6px 12px; border-radius: 8px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-card {
            display: flex; align-items: flex-start; gap: 10px; padding: 14px;
            border: 2px solid #f0e0d0; border-radius: 14px; cursor: pointer;
            transition: all 0.25s ease; background: #fff;
        }
        .option-card:hover { border-color: #e07b39; background: #fff8f2; }
        .option-card.selected { border-color: #c45c26; background: #fef3e8; }
        .option-card.disabled { opacity: 0.45; cursor: not-allowed; }
        .option-indicator {
            width: 20px; height: 20px; min-width: 20px; border: 2px solid #d4b896;
            border-radius: 50%; margin-top: 2px; display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
        }
        .option-card.multi-type .option-indicator { border-radius: 4px; }
        .option-card.selected .option-indicator { border-color: #c45c26; background: #c45c26; }
        .option-indicator::after { content: ''; width: 8px; height: 8px; background: #fff; border-radius: 50%; opacity: 0; transition: opacity 0.2s; }
        .option-card.multi-type .option-indicator::after { content: '✓'; width: auto; height: auto; background: none; font-size: 12px; font-weight: 700; color: #fff; border-radius: 0; }
        .option-card.selected .option-indicator::after { opacity: 1; }
        .option-content { flex: 1; }
        .option-label { font-size: 14px; font-weight: 600; color: #5a3e2b; margin-bottom: 2px; }
        .option-desc { font-size: 13px; color: #8b6f47; line-height: 1.5; }
        .text-input {
            width: 100%; min-height: 100px; padding: 14px; border: 2px solid #e8d5c0;
            border-radius: 12px; font-size: 14px; color: #4a3728; line-height: 1.6;
            resize: vertical; font-family: inherit; transition: border-color 0.2s;
        }
        .text-input:focus { outline: none; border-color: #c45c26; }
        .text-input::placeholder { color: #c4a882; }
        .nav-buttons { display: flex; gap: 12px; margin-top: 6px; }
        .btn {
            flex: 1; padding: 13px 18px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .btn-secondary { background: #f0e0d0; color: #8b6f47; }
        .btn-secondary:hover { background: #e8d5c0; }
        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(135deg, #e07b39, #c45c26); color: #fff;
            box-shadow: 0 4px 12px rgba(196,92,38,0.3);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(196,92,38,0.4); }
        .result-section {
            display: none; background: #fff; border-radius: 20px; padding: 28px 22px;
            box-shadow: 0 4px 24px rgba(196,92,38,0.12); text-align: center;
        }
        .result-section.active { display: block; }
        .result-badge {
            display: inline-block; background: linear-gradient(135deg, #e07b39, #c45c26);

        .result-image { width: 100%; max-width: 280px; margin: 0 auto 16px; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 16px rgba(196,92,38,0.15); }
        .result-image img { width: 100%; height: auto; display: block; }

        .result-desc { font-size: 14px; color: #5a3e2b; line-height: 1.7; margin-bottom: 16px; text-align: left; background: #fef9f3; padding: 14px; border-radius: 12px; }
        .result-suggestion { font-size: 14px; color: #5a3e2b; line-height: 1.7; margin-bottom: 16px; text-align: left; background: #f3f8f0; padding: 14px; border-radius: 12px; border-left: 4px solid #6b9e5c; }
        .result-suggestion-label { font-weight: 600; color: #4a7c3f; margin-bottom: 4px; display: block; }
        .result-meta { display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .meta-tag { background: #f0e0d0; color: #6b4e3d; font-size: 12px; padding: 5px 12px; border-radius: 20px; }
        .result-dimension { background: #fef9f3; border-radius: 12px; padding: 14px; margin-bottom: 16px; text-align: left; }
        .dimension-title { font-size: 13px; font-weight: 600; color: #c45c26; margin-bottom: 10px; }
        .dimension-bar-group { margin-bottom: 8px; }
        .dimension-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: #8b6f47; margin-bottom: 4px; }
        .dimension-bar-bg { width: 100%; height: 6px; background: #f0e0d0; border-radius: 3px; overflow: hidden; position: relative; }
        .dimension-bar-center { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #8b6f47; z-index: 2; }
        .dimension-bar-fill { height: 100%; border-radius: 3px; transition: all 0.6s ease; position: absolute; top: 0; }
        .result-actions { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .btn-copy { background: #fff; color: #c45c26; border: 2px solid #c45c26; padding: 11px 18px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-copy:hover { background: #fef3e8; }
        .btn-copy.copied { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
        .btn-restart { background: #f0e0d0; color: #8b6f47; border: none; padding: 11px 18px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-restart:hover { background: #e8d5c0; }
        .result-footer { font-size: 13px; color: #8b6f47; line-height: 1.6; padding-top: 14px; border-top: 1px solid #f0e0d0; }
        .result-footer a { color: #c45c26; text-decoration: none; font-weight: 600; }
        .result-footer a:hover { text-decoration: underline; }
        .btn-detail { background: linear-gradient(135deg, #f5e6d3, #faf3e8); color: #c45c26; border: 2px solid #e07b39; padding: 11px 18px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
        .btn-detail:hover { background: #fef3e8; transform: translateY(-1px); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff; border-radius: 20px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 28px 22px; position: relative; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .modal-close { position: absolute; top: 14px; right: 16px; width: 32px; height: 32px; border: none; background: #f0e0d0; border-radius: 50%; font-size: 18px; color: #8b6f47; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .modal-close:hover { background: #e8d5c0; color: #c45c26; }
        .modal-title { font-size: 22px; font-weight: 700; color: #c45c26; margin-bottom: 6px; text-align: center; }
        .modal-subtitle { font-size: 13px; color: #8b6f47; text-align: center; margin-bottom: 18px; }
        .modal-section { margin-bottom: 16px; }
        .modal-section-title { font-size: 14px; font-weight: 600; color: #c45c26; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .modal-section-text { font-size: 14px; color: #5a3e2b; line-height: 1.7; }
        .modal-badge { display: inline-block; background: #fef3e8; color: #c45c26; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
        .toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75); color: #fff; padding: 12px 22px;
            border-radius: 10px; font-size: 14px; z-index: 1000;

        .toast.show { opacity: 1; }
        .hidden { display: none !important; }
        @media (max-width: 480px) {
            body { padding: 10px; }
            .header h1 { font-size: 22px; }

            .option-desc { font-size: 12px; }
            .result-role { font-size: 24px; }
            .btn { font-size: 14px; padding: 11px 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>汕头文化现代化倾向测试</h1>
            <div class="subtitle">本问卷匿名填写，结果仅用于思政课实践分析。感谢参与！</div>
        </div>
        <div class="progress-section" id="progressSection">
            <div class="progress-info">
                <span id="progressText">第 1 题 / 共 16 题</span>

<script>
(function() {
    'use strict';

    var questions = [
        {
            id: 3, dimension: '传承性', type: 'single',
            text: '您认为潮汕英歌舞的表演形式应该？',
            options: [
                { label: 'A', desc: '严格保留传统步法和脸谱，不能改动' },
                { label: 'B', desc: '可以加入现代舞蹈、灯光、电音，只要保留核心气势' },
                { label: 'C', desc: '彻底创新，与流行文化完全融合' }
            ]
        },
        {
            id: 4, dimension: '传承性', type: 'single',
            text: '对于汕头小公园骑楼建筑群，您更支持哪种发展方式？',
            options: [
                { label: 'A', desc: '完全保持原貌，只允许老字号入驻' },
                { label: 'B', desc: '外观不变，内部可引入现代品牌和创意商铺' },
                { label: 'C', desc: '可以改建部分区域以适应现代商业需求' }
            ]
        },
        {
            id: 5, dimension: '传承性', type: 'single',
            text: '对于潮剧、潮汕歌谣等传统艺术形式，您认为应该？',
            options: [
                { label: 'A', desc: '严格保持原腔原调、传统剧本和表演程式，不能改编' },
                { label: 'B', desc: '可以改编剧本、加入新唱腔，但保留核心曲牌和表演精髓' },
                { label: 'C', desc: '可以大胆融合流行音乐、现代舞美、多媒体技术，甚至改编成音乐剧' }
            ]
        },
        {
            id: 6, dimension: '青年吸引力', type: 'single',
            text: '如果要吸引更多年轻人参与汕头文化，您认为最有效的方式是？',
            options: [
                { label: 'A', desc: '进校园、开选修课' },
                { label: 'B', desc: '举办文创市集、非遗体验工作坊' },
                { label: 'C', desc: '制作短视频、表情包、游戏皮肤' },
                { label: 'D', desc: '与潮牌、音乐节跨界合作' }
            ]
        },
        {
            id: 7, dimension: '数字化', type: 'multi', maxSelect: 3,
            text: '您是否通过以下线上方式接触过汕头文化？',
            multiHint: '多选题，最多选择3项',
            options: [
                { label: 'A', desc: '抖音/快手短视频' },
                { label: 'B', desc: '小红书/微博图文' },
                { label: 'C', desc: '线上展馆或纪录片' },
                { label: 'D', desc: '潮汕文化主题的H5小游戏' },
                { label: 'E', desc: '基本没有接触过' }
            ]
        },
        {
            id: 8, dimension: '数字化', type: 'multi', maxSelect: 2,
            text: '您认为汕头文化数字化传播目前存在的主要问题是？',
            multiHint: '多选题，最多选择2项',
            options: [
                { label: 'A', desc: '内容太严肃、不够有趣' },
                { label: 'B', desc: '缺乏高质量短视频和课程' },
                { label: 'C', desc: '形式单一，缺少互动体验' },
                { label: 'D', desc: '没有明显问题' }
            ]
        },
        {
            id: 9, dimension: '开放包容性', type: 'single',
            text: '您认为汕头目前文旅融合（如小公园、南澳岛、美食节）做得如何？',
            options: [
                { label: 'A', desc: '很好，已经很有特色，体验丰富' },
                { label: 'B', desc: '一般，还有提升空间' },
                { label: 'C', desc: '较差，商业化过度或缺乏吸引力' }
            ]
        },
        {
            id: 10, dimension: '开放包容性', type: 'single',
            text: '您最希望汕头开发以下哪种文创产品？',
            options: [
                { label: 'A', desc: '英歌舞/潮剧主题的盲盒、手办、潮玩' },
                { label: 'B', desc: '潮汕美食迷你厨房玩具或食玩' },
                { label: 'C', desc: '小公园骑楼积木模型、拼图' },
                { label: 'D', desc: '工夫茶便携套装+数字茶谱App' }
            ]
        },
        {
            id: 11, dimension: '开放包容性', type: 'single',
            text: '外地朋友来汕头，您会优先推荐他们体验以下哪一项？',
            options: [
                { label: 'A', desc: '小公园骑楼+美食街' },
                { label: 'B', desc: '看一场英歌舞或潮剧表演' },
                { label: 'C', desc: '喝一顿完整的工夫茶' },
                { label: 'D', desc: '参加一次民俗节庆（如营老爷）' }
            ]
        },
        {
            id: 12, dimension: '开放包容性', type: 'single',
            text: '您认为潮汕方言、潮剧等文化内容对外地人的理解门槛如何？',
            options: [
                { label: 'A', desc: '很高，完全听不懂，需要简化或配字幕、解说' },
                { label: 'B', desc: '有一定门槛，但加上字幕或简单解说就能懂' },
                { label: 'C', desc: '不高，视觉和氛围本身就能感染人' }
            ]
        },
        {

            }
            html += '<div class="options">';
            for (var idx = 0; idx < q.options.length; idx++) {
                var opt = q.options[idx];

                if (isMulti) {
                    selected = (answers[currentQuestion] || []).indexOf(idx) > -1;
                    if (!selected && q.maxSelect < 99 && (answers[currentQuestion] || []).length >= q.maxSelect) disabled = true;
                } else {
                    selected = answers[currentQuestion] === idx;
                }
                // 互斥选项禁用：Q7选E后禁用A-D，Q8选D后禁用A-C
                if (isMulti && !selected) {
                    var curSel = answers[currentQuestion] || [];
                    if (q.id === 7 && curSel.indexOf(4) > -1 && idx !== 4) disabled = true;
                    if (q.id === 8 && curSel.indexOf(3) > -1 && idx !== 3) disabled = true;
                }

            }
            html += '</div>';

            for (var j = 0; j < opts.length; j++) {
                opts[j].addEventListener('click', function() {

        // 互斥逻辑：Q7选E(索引4)与其他互斥，Q8选D(索引3)与其他互斥
        var isExclusive = false;
        if (q.id === 7 && idx === 4) isExclusive = true; // Q7 选 E
        if (q.id === 8 && idx === 3) isExclusive = true; // Q8 选 D

        if (q.id === 7 && sel.indexOf(4) > -1) hasExclusive = true;

                sel = [idx];
            } else {
                sel.push(idx);
            }
        }
        answers[currentQuestion] = sel;
        renderQuestion();
        updateProgress();

        $('resultRegion').textContent = region;

        if (role.image) {
            $('resultImage').src = role.image;
            $('resultImage').alt = role.name + '角色形象';
            $('resultImageContainer').style.display = 'block';
        } else {
            $('resultImageContainer').style.display = 'none';
        }

        renderBars(traditionScore, 12, openScore, 14, ritualScore, 15, authorityScore, 12);

        $('questionSection').classList.add('hidden');
        $('progressSection').classList.add('hidden');
        $('profileSection').classList.add('hidden');
        $('resultSection').classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (e) {
            console.error('提交测试时出错:', e);
            showToast('系统错误，请刷新页面重试');
        }
    }

    function renderBars(tScore, tMax, oScore, oMax, rScore, rMax, aScore, aMax) {
        var dims = [
            { name: '传承 vs 创新', left: '传承 T', right: '创新 I', score: tScore, max: tMax, color: '#c45c26' },
            { name: '封闭 vs 开放', left: '封闭 L', right: '开放 G', score: oScore, max: oMax, color: '#e07b39' },
            { name: '仪式 vs 效率', left: '仪式 R', right: '效率 E', score: rScore, max: rMax, color: '#6b9e5c' },
            { name: '权威 vs 自主', left: '权威 A', right: '自主 P', score: aScore, max: aMax, color: '#5b8db8' }
        ];
        var html = '<div class="dimension-title">维度倾向分析（居中为均衡）</div>';
        for (var i = 0; i < dims.length; i++) {
            var d = dims[i];
            // 计算偏离中心的比例 (-50% 到 +50%)
            var mid = d.max / 2;
            var deviation = (d.score - mid) / mid; // -1 到 1
            var barWidth = Math.abs(deviation) * 50; // 0% 到 50%
            var isLeft = deviation < 0;
            var isCenter = Math.abs(deviation) < 0.1;
            
            var barStyle = '';
            if (isCenter) {
                // 均衡状态：显示小圆点在中心
                barStyle = 'left:48%;width:4%;background:' + d.color + ';border-radius:3px;';
            } else if (isLeft) {
                // 偏左：从中心向左延伸
                barStyle = 'right:50%;width:' + barWidth + '%;background:' + d.color + ';border-radius:3px 0 0 3px;';
            } else {
                // 偏右：从中心向右延伸
                barStyle = 'left:50%;width:' + barWidth + '%;background:' + d.color + ';border-radius:0 3px 3px 0;';
            }
            
            html += '<div class="dimension-bar-group">' +
                '<div class="dimension-bar-label"><span>' + d.left + '</span><span>' + d.right + '</span></div>' +
                '<div class="dimension-bar-bg">' +
                '<div class="dimension-bar-center"></div>' +
                '<div class="dimension-bar-fill" style="' + barStyle + '"></div>' +
                '</div></div>';
        }
        $('resultDimension').innerHTML = html;
    }

    function copyResult() {
        var role = $('resultRole').textContent;
        var desc = $('resultDesc').textContent;
        var suggestion = $('resultSuggestion').textContent;
        var age = $('resultAge').textContent;
        var region = $('resultRegion').textContent;

        // 构建完整的作答结果文本
        var text = '【汕头文化现代化倾向测试结果】\n';
        text += '================================\n\n';

        // 角色结果
        text += '【角色结果】\n';
        text += '角色名称：' + role + '\n';
        text += '性格描述：' + desc + '\n';
        text += '改造建议：' + suggestion + '\n\n';

        // 基本信息
        text += '【基本信息】\n';
        text += 'Q1. 年龄段：' + age + '\n';
        text += 'Q2. 身份：' + region + '\n\n';

        // 所有题目作答详情
        text += '【答题详情】\n';

        // Q3-Q15
        for (var i = 0; i < questions.length; i++) {
            var q = questions[i];
            var qNum = q.id;
            var ans = answers[i];
            var ansText = '';

            if (q.type === 'single') {
                if (ans !== null && ans !== undefined) {
                    ansText = q.options[ans].label + '. ' + q.options[ans].desc;
                } else {
                    ansText = '未作答';
                }
            } else if (q.type === 'multi') {
                if (Array.isArray(ans) && ans.length > 0) {
                    var parts = [];
                    for (var j = 0; j < ans.length; j++) {
                        parts.push(q.options[ans[j]].label + '. ' + q.options[ans[j]].desc);
                    }
                    ansText = parts.join('、');
                } else {
                    ansText = '未作答';
                }
            } else if (q.type === 'text') {
                if (typeof ans === 'string' && ans.trim().length > 0) {
                    ansText = ans.trim();
                } else {
                    ansText = '未作答';
                }
            }

            text += 'Q' + qNum + '. ' + q.text + '\n';
            text += '答案：' + ansText + '\n\n';
        }

        text += '================================\n';
        text += '请将此内容粘贴到腾讯问卷中。';

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(showCopySuccess).catch(function() { fallbackCopy(text); });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showCopySuccess(); }
        catch(e) { showToast('复制失败，请手动复制'); }
        document.body.removeChild(ta);
    }

    function showCopySuccess() {
        var btn = $('copyBtn');
        btn.textContent = '✅ 已复制';
        btn.classList.add('copied');
        showToast('结果已复制到剪贴板');
        setTimeout(function() { btn.textContent = '📋 复制结果'; btn.classList.remove('copied'); }, 2000);
    }

    function restartTest() {
        currentQuestion = 0;
        for (var i = 0; i < questions.length; i++) {
            if (questions[i].type === 'multi') answers[i] = [];
            else if (questions[i].type === 'text') answers[i] = '';
            else answers[i] = null;
        }
        $('ageSelect').value = '';
        $('regionSelect').value = '';
        $('questionSection').classList.remove('hidden');
        $('progressSection').classList.remove('hidden');
        $('profileSection').classList.remove('hidden');
        $('resultSection').classList.remove('active');
        renderQuestion();
        updateProgress();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openModal() {
        var roleName = $('resultRole').textContent;
        var roleKey = '';
        for (var k in roleLibrary) {
            if (roleLibrary[k].name === roleName) { roleKey = k; break; }
        }
        var r = roleLibrary[roleKey] || roleLibrary['default'];
        $('modalTitle').textContent = r.alias || r.name;
        $('modalSubtitle').textContent = r.name + ' · ' + (roleKey === 'default' ? '混合倾向' : roleKey);
        $('modalCreed').textContent = r.creed || '--';
        $('modalTrait').textContent = r.trait || '--';
        $('modalSymbol').textContent = r.symbol || '--';
        $('modalOverlay').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        $('modalOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }

    // Bind nav buttons
    $('prevBtn').addEventListener('click', goPrev);
    $('nextBtn').addEventListener('click', goNext);
    $('copyBtn').addEventListener('click', copyResult);
    $('restartBtn').addEventListener('click', restartTest);
    $('detailBtn').addEventListener('click', openModal);
    $('modalClose').addEventListener('click', closeModal);
    $('modalOverlay').addEventListener('click', function(e) {
        if (e.target === $('modalOverlay')) closeModal();
    });

    // Init
    renderQuestion();
    updateProgress();
})();
</script>
</body>
</html>
